<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintex.AI — Open Source AI Search Engine</title>
    <meta name="description" content="Sintex.AI: Open-source AI search engine powered by BitNet 1.58-bit ternary LLM. Like Perplexity, but free, open, and runs on any device. Research begins here.">
    <meta name="keywords" content="AI search, open source search engine, BitNet, Perplexity alternative, Sintex AI, ternary LLM, decentralized AI">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://sintex.ai/search.html">
    <meta property="og:title" content="Sintex.AI — Open Source AI Search Engine">
    <meta property="og:description" content="AI search powered by BitNet 1.58-bit. Like Perplexity, but open source and runs anywhere.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sintex.ai/search.html">
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"WebApplication","name":"Sintex.AI Search","url":"https://sintex.ai/search.html","applicationCategory":"SearchApplication","operatingSystem":"Any","description":"Open-source AI search engine powered by BitNet 1.58-bit ternary LLM","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"Sintex.AI"}}
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sintex-search.css">
</head>
<body>
    <!-- Nav -->
    <nav class="s-nav">
        <div class="s-nav-inner">
            <a href="/" class="s-logo">
                <div class="s-logo-icon">S</div>
                <span>Sintex<span style="color:var(--s-text3)">.AI</span></span>
            </a>
            <div class="s-nav-links">
                <a href="/bitnet-research.html" class="s-nav-btn">Research</a>
                <a href="/binary-computing.html" class="s-nav-btn">Binary</a>
                <a href="https://www.standardbitcoin.io" class="s-nav-btn" target="_blank">Bitcoin</a>
                <button class="s-nav-btn s-theme-btn" id="theme-toggle" title="Toggle theme">
                    <svg id="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                    <svg id="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="s-main" id="app">
        <!-- Empty State (shown when no conversation) -->
        <div class="s-empty" id="empty-state">
            <div class="s-empty-title">Research begins here.</div>
            <div class="s-empty-subtitle">Open-source AI search powered by BitNet 1.58-bit</div>
            <div class="s-input-wrap">
                <div class="s-input-box">
                    <textarea class="s-input-textarea" id="search-input" placeholder="Ask anything..." rows="1"></textarea>
                    <button class="s-send-btn" id="send-btn" title="Search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                    </button>
                </div>
            </div>
            <div class="s-chips" id="suggestion-chips">
                <button class="s-chip" data-q="What is BitNet 1.58-bit LLM?">What is BitNet 1.58-bit?</button>
                <button class="s-chip" data-q="How does ternary quantization work in AI?">Ternary quantization</button>
                <button class="s-chip" data-q="Bitcoin energy efficiency and AI">Bitcoin + AI energy</button>
                <button class="s-chip" data-q="Compare Sintex.AI vs Perplexity">Sintex vs Perplexity</button>
                <button class="s-chip" data-q="Apple M5 Pro NPU for AI inference">M5 Pro NPU</button>
                <button class="s-chip" data-q="What is STBTCx token?">STBTCx token</button>
            </div>
        </div>

        <!-- Conversation (shown after first search) -->
        <div class="s-conversation" id="conversation" style="display:none"></div>
    </div>

    <!-- Sticky Input (appears after conversation starts) -->
    <div class="s-input-sticky" id="sticky-input" style="display:none">
        <div class="s-input-wrap">
            <div class="s-input-box">
                <textarea class="s-input-textarea" id="search-input-sticky" placeholder="Ask a follow-up..." rows="1"></textarea>
                <button class="s-send-btn" id="send-btn-sticky" title="Search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- OS Taskbar -->
    <div class="s-os-bar" id="os-taskbar">
        <div class="s-os-icon active" title="Search" onclick="goHome()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </div>
        <div class="s-os-icon" title="BitNet Research" onclick="window.open('/bitnet-research.html','_blank')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <div class="s-os-icon" title="Standard Bitcoin" onclick="window.open('https://www.standardbitcoin.io','_blank')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 14.93V18h-2v-1.07A4 4 0 018 13h2a2 2 0 104 0c0 .87-.56 1.64-1.38 1.91L12 15.12V13h1a4 4 0 001-7.93V4h-2v1.07A4 4 0 008 9h2a2 2 0 114 0c0-.87.56-1.64 1.38-1.91L12 6.88V9h-1a4 4 0 00-1 7.93z"/></svg>
        </div>
        <div class="s-os-icon" title="Bitcoin Brasil" onclick="window.open('https://bitcoinbrasil.org','_blank')">&#127463;&#127479;</div>
        <div class="s-os-icon" title="Buy STBTCx" onclick="window.open('https://pump.fun/coin/386JZJtkvf43yoNawAHmHHeEhZWUTZ4UuJJtxC9fpump','_blank')">&#129689;</div>
        <span class="s-os-clock" id="os-clock"></span>
    </div>

    <script src="bitnet-client.js"></script>
    <script src="sintex-search.js"></script>
</body>
</html>
