            --subtext-color: #9ca3af; /* gray-400 */
            --border-color: #4b5563; /* gray-600 */

                padding: 10px !important;
            }
            .search-button {
                font-size: 13px !important;
                padding: 10px 16px !important;
            }
            /* Fix modal responsiveness */
            #aurora-modal-content, #stbtcx-wallet-modal > div {
                width: 95% !important;
                margin: 10px !important;
                padding: 15px !important;
            }
            /* Footer responsiveness */

                flex-direction: column !important;
                gap: 15px !important;
                text-align: center !important;
            }
            /* Button positions on mobile */
            #aurora-chatgpt-btn {
                left: 10px !important;
                transform: scale(0.9) !important;
            }
            #stbtcx-secure-btn {
                left: 130px !important;
                transform: scale(0.9) !important;
            }
            #web3-connect-enhanced, #web3-connect-btn-fixed {
                right: 10px !important;
                transform: scale(0.9) !important;
            }
        }
        
        @media (min-width: 641px) and (max-width: 1024px) {
            /* Tablets (iPad, Android tablets) */
            .search-bar-container {
                max-width: 80% !important;
            }
            footer > div {
                padding: 10px 20px !important;
            }
        }
        
        @media (min-width: 1025px) {
            /* Desktop and larger screens */
            .search-bar-container {
                max-width: 600px !important;
            }
        }
        
        /* iOS specific fixes */
        @supports (-webkit-touch-callout: none) {
            body {
                -webkit-text-size-adjust: 100%;
            }
            input, button {
                -webkit-appearance: none;
                -webkit-border-radius: 0;
            }
        }
        
        /* Android/HarmonyOS specific */
        @media (hover: none) and (pointer: coarse) {
            button {
                min-height: 44px;
                min-width: 44px;
            }
        }

        /* Animation Styles */
        @keyframes fallAndBounce {
            0% {
                transform: translateY(-250px) scale(1.5);
                opacity: 0;
            }
            60% {
                transform: translateY(20px) scale(0.9);
                opacity: 1;
            }
            80% {
                transform: translateY(-10px) scale(0.95);
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

            display: inline-block;
            opacity: 0;
            animation: fallAndBounce 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;

            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        const voiceIcon = document.querySelector('svg[viewBox="0 0 24 24"][fill="currentColor"]');
        if (voiceIcon && 'webkitSpeechRecognition' in window) {
            voiceIcon.style.cursor = 'pointer';
            voiceIcon.addEventListener('click', () => {
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'en-US';
                recognition.onresult = (event) => {
                    searchInput.value = event.results[0][0].transcript;
                    performSearch();
                };
                recognition.start();
            });
        }
        luckyBtn.addEventListener('click', () => {
            const randomSite = searchSuggestions[Math.floor(Math.random() * searchSuggestions.length)];
            window.open(randomSite.url, '_blank');
        });
        
        // Remove search preview - only keep autocomplete functionality
        searchInput.addEventListener('input', (e) => {
            // Hide preview box completely
            searchPreview.style.display = 'none';
            
            // Add Google Chrome-style autocomplete
            if (e.target.value.trim().length > 2) {
                // Enable Chrome's native autocomplete
                searchInput.setAttribute('autocomplete', 'on');
                searchInput.setAttribute('list', 'search-suggestions');
            }
        });
        
        // Add datalist for Chrome-style suggestions
        const dataList = document.createElement('datalist');
        dataList.id = 'search-suggestions';
        searchSuggestions.forEach(site => {
            const option = document.createElement('option');
            option.value = site.title;
            dataList.appendChild(option);
        });
        searchInput.parentElement.appendChild(dataList);
        
        // Always hide preview box
        searchInput.addEventListener('focus', () => {
            searchPreview.style.display = 'none';
        });
        
        searchInput.addEventListener('blur', () => {
            searchPreview.style.display = 'none';
        });
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.key === 'Escape' && document.activeElement === searchInput) {
                searchInput.value = '';
                searchInput.blur();
                searchPreview.style.display = 'none';
            }
        });

        // On page load, always start with white/light theme
        document.addEventListener('DOMContentLoaded', () => {
            // Always force light theme on initial load
            root.classList.remove('dark', 'gray-mode');
            document.body.style.backgroundColor = '#ffffff';
            
            // After 2 seconds, switch to dark mode
            setTimeout(() => {
                applyTheme('dark');
            }, 2000);
            
        });
    </script>

                    <input type="radio" name="package" value="10" checked style="margin-right: 10px;">
                    <span style="flex: 1;">10 STBTCx</span>
                    <strong style="color: #667eea;">10 USDC</strong>
                </label>
                
                <label style="padding: 15px; border: 2px solid #667eea; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                    <input type="radio" name="package" value="100" style="margin-right: 10px;">
                    <span style="flex: 1;">100 STBTCx</span>
                    <strong style="color: #667eea;">100 USDC</strong>
                </label>
                
                <label style="padding: 15px; border: 2px solid #667eea; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                    <input type="radio" name="package" value="500" style="margin-right: 10px;">
                    <span style="flex: 1;">500 STBTCx</span>
                    <strong style="color: #667eea;">500 USDC</strong>
                </label>
            </div>
            
            <!-- Payment Options -->
            <div style="display: grid; gap: 10px; margin-bottom: 20px;">
                <button onclick="connectPhantomForPurchase()" style="padding: 15px; background: linear-gradient(135deg, #AB9FF2, #8B7FB8); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <span style="font-size: 20px;">👻</span> Pay with Phantom (USDC)
                </button>
                
                <div style="text-align: center; margin: 5px 0; color: #999; font-size: 12px;">— OR —</div>
                
                <input type="text" id="stbtcx-wallet" placeholder="Your Solana wallet (for card payment)" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
                
                <button onclick="buySTBTCx()" style="padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;">

            <p style="color: #999; font-size: 11px; text-align: center;">

                Contract: 386JZJtkvf43yoNawAHmHHeEhZWUTZ4UuJJtxC9fpump
            </p>
        </div>
    `;
    
    document.body.appendChild(modal);
    
    // Phantom wallet connection for purchase
    window.connectPhantomForPurchase = async function() {
        const selectedPackage = document.querySelector('input[name="package"]:checked');
        if (!selectedPackage) {
            alert('Please select an amount');
            return;
        }
        
        const amount = parseInt(selectedPackage.value);
        
        if (window.solana && window.solana.isPhantom) {
            try {
                // Always request connection (don't assume it's connected)
                const resp = await window.solana.connect({ onlyIfTrusted: false });
                const publicKey = resp.publicKey;
                
                console.log('Phantom connected:', publicKey.toString());
                
                // Import Solana Web3.js and SPL Token
                if (!window.solanaWeb3) {
                    const script = document.createElement('script');
                    script.src = 'https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js';
                    document.head.appendChild(script);
                    await new Promise(resolve => script.onload = resolve);
                }
                
                if (!window.splToken) {
                    const splScript = document.createElement('script');
                    splScript.src = 'https://unpkg.com/@solana/spl-token@latest/lib/index.iife.min.js';
                    document.head.appendChild(splScript);
                    await new Promise(resolve => splScript.onload = resolve);
                }
                
                const connection = new window.solanaWeb3.Connection('https://api.mainnet-beta.solana.com');
                const { Transaction, PublicKey, LAMPORTS_PER_SOL } = window.solanaWeb3;
                
                // Token addresses (public information only)
                const STBTCX_TOKEN_MINT = new PublicKey('386JZJtkvf43yoNawAHmHHeEhZWUTZ4UuJJtxC9fpump'); // STBTCx token
                const USDC_MINT = new PublicKey('EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v'); // USDC token
                // Treasury wallet is kept secret on backend
                
                // Instead of exposing treasury, request payment instructions from backend
                console.log('Requesting secure payment instructions from backend...');
                
                // Get payment instructions from backend (keeps treasury address secret)
                const instructionResponse = await fetch('/.netlify/functions/stbtcx-secure-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'get-payment-instruction',
                        buyer_wallet: publicKey.toString(),
                        quantity: amount,
                        payment_method: 'USDC'
                    })
                });
                
                if (!instructionResponse.ok) {
                    throw new Error('Failed to get payment instructions');
                }
                
                const paymentData = await instructionResponse.json();
                
                // Create transaction based on backend instructions
                // Backend returns a serialized transaction that user just needs to sign
                if (paymentData.transaction) {
                    // Deserialize and sign the transaction from backend
                    const { Transaction } = window.solanaWeb3;
                    const transaction = Transaction.from(Buffer.from(paymentData.transaction, 'base64'));
                    
                    // User only signs, doesn't know the destination
                    const signed = await window.solana.signAndSendTransaction(transaction);
                    
                    console.log('Transaction signed:', signed.signature);
                    
                    // Confirm with backend
                    const confirmResponse = await fetch('/.netlify/functions/stbtcx-secure-checkout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'confirm-payment',
                            signature: signed.signature,
                            buyer_wallet: publicKey.toString(),
                            quantity: amount
                        })
                    });
                    
                    const result = await confirmResponse.json();
                    
                    if (result.success) {
                        alert(`✅ Transaction completed!\n\n💵 Sent: ${amount} USDC\n🪙 Receiving: ${amount} STBTCx\n📝 TX: ${signed.signature.substring(0, 20)}...\n\n✅ STBTCx tokens sent to your wallet`);
                    } else {
                        throw new Error(result.error || 'Transaction confirmation failed');
                    }
                } else {
                    // Fallback: Simple notification to backend
                    alert('Please send USDC manually to complete the transaction. Contact support for the payment address.');
                }
                
                // Optional: verify transaction
                const confirmation = await connection.confirmTransaction(signed.signature);
                if (confirmation.value.err) {
                    throw new Error('Transaction failed');
                }
                
                modal.remove();
                
            } catch (error) {
                console.error('Phantom transaction error:', error);
                
                if (error.message.includes('User rejected')) {
                    alert('Transaction cancelled by user.');
                } else if (error.message.includes('insufficient')) {
                    alert('Insufficient SOL balance for transaction fees. Please add SOL to your wallet.');
                } else {
                    alert(`Transaction failed: ${error.message}\n\nPlease ensure:\n1. You have SOL for fees\n2. You approved the transaction in Phantom\n3. Your wallet is unlocked`);
                }
            }
        } else {
            // Phantom not installed
            if (confirm('Phantom wallet not detected. Would you like to install it?')) {
                window.open('https://phantom.app/', '_blank');
            }
        }
    };
}

async function buySTBTCx() {

    }

        return;

    const quantity = parseInt(selectedPackage.value);
    
    try {

        const response = await fetch('/.netlify/functions/stbtcx-secure-checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action: 'create-session',
                buyer_wallet: wallet,
                quantity: quantity  // 1:1 parity maintained
            })
        });
        
        const data = await response.json();
        
        if (data.url) {
            window.location.href = data.url;
        } else {
            alert('Error creating checkout. Please try again.');
        }
    } catch (error) {
        console.error('Checkout error:', error);
        alert('Error connecting to payment system. Please try again.');
    }
}
