<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1117">
    <title>SintexOS — AI-Powered Operating System | BitNet 1.58-bit Engine</title>
    <meta name="description" content="SintexOS is an AI-powered operating system running on BitNet 1.58-bit ternary engine. Linux philosophy meets Perplexity AI. Lightweight, powerful, sovereign.">
    <meta name="keywords" content="SintexOS, AI operating system, BitNet OS, ternary computing, AI desktop, Linux AI, sovereign computing, decentralized OS">
    <meta property="og:title" content="SintexOS — AI-Powered Operating System">
    <meta property="og:description" content="The sovereign AI operating system. BitNet 1.58-bit engine. {-1, 0, +1} ternary computing. Built for humans, powered by AI.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sintex.ai/os.html">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "SintexOS",
        "applicationCategory": "OperatingSystem",
        "operatingSystem": "Web Browser (Cross-Platform)",
        "description": "AI-powered operating system built on BitNet 1.58-bit ternary engine. Linux philosophy, Perplexity AI intelligence.",
        "url": "https://sintex.ai/os.html",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "creator": { "@type": "Organization", "name": "Sintex.AI", "url": "https://sintex.ai" }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sintex-os.css">
</head>
<body>
    <!-- BOOT SCREEN -->
    <div id="os-boot">
        <canvas id="boot-canvas"></canvas>
        <div id="boot-logo">
            <div class="boot-icon">
                <span class="boot-s">S</span><span class="boot-dot">.</span><span class="boot-os">OS</span>
            </div>
            <div class="boot-sub">BitNet 1.58-bit Ternary Engine</div>
            <div class="boot-progress"><div class="boot-bar"></div></div>
            <div class="boot-status">Initializing kernel...</div>
        </div>
    </div>

    <!-- DESKTOP -->
    <div id="os-desktop">
        <canvas id="os-wallpaper"></canvas>
        <div id="os-icons"></div>
    </div>

    <!-- WINDOWS LAYER -->
    <div id="os-windows"></div>

    <!-- CONTEXT MENU -->
    <div id="os-ctx" class="os-ctx hidden">
        <div class="os-ctx-item" data-action="new-note">New Note</div>
        <div class="os-ctx-item" data-action="open-terminal">Open Terminal</div>
        <div class="os-ctx-sep"></div>
        <div class="os-ctx-item" data-action="settings">Settings</div>
        <div class="os-ctx-item" data-action="refresh">Refresh Desktop</div>
        <div class="os-ctx-sep"></div>
        <div class="os-ctx-item" data-action="about">About SintexOS</div>
    </div>

    <!-- START MENU -->
    <div id="os-start" class="hidden">
        <div class="start-header">
            <input type="text" id="start-search" placeholder="Search apps, files, settings..." autocomplete="off">
        </div>
        <div class="start-grid" id="start-grid"></div>
        <div class="start-footer">
            <div class="start-user">
                <div class="start-avatar">S</div>
                <span>Sintex User</span>
            </div>
            <div class="start-power">
                <button class="start-power-btn" data-action="restart" title="Restart">&#8635;</button>
                <button class="start-power-btn" data-action="shutdown" title="Exit to sintex.ai">&#9211;</button>
            </div>
        </div>
    </div>

    <!-- TASKBAR -->
    <div id="os-taskbar">
        <button id="os-start-btn" title="Start Menu">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <rect x="1" y="1" width="7" height="7" rx="1.5" fill="currentColor"/>
                <rect x="10" y="1" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.7"/>
                <rect x="1" y="10" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.7"/>
                <rect x="10" y="10" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.5"/>
            </svg>
        </button>
        <div id="os-pinned"></div>
        <div id="os-taskbar-windows"></div>
        <div class="taskbar-spacer"></div>
        <div id="os-tray">
            <span class="tray-icon" title="OpenClaw Agent">&#129302;</span>
            <span class="tray-icon" title="Network">&#128246;</span>
            <span class="tray-icon" title="BitNet Engine">&#9889;</span>
            <div id="os-clock"></div>
        </div>
    </div>

    <!-- NOTIFICATION -->
    <div id="os-notify" class="hidden"></div>

    <script src="bitnet-client.js"></script>
    <script src="sintex-os.js"></script>
</body>
</html>
