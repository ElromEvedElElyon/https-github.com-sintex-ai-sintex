<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>SintexOS — AI-Native Operating System</title>
<meta name="description" content="SintexOS: The AI-native operating system. Built on BitNet 1.58-bit ternary engine. Windows 11 design meets Perplexity AI intelligence meets OpenClaw sovereign agents.">
<meta property="og:title" content="SintexOS — AI-Native Operating System">
<meta property="og:description" content="The future of computing. AI-native OS with sovereign agents, BitNet engine, and Perplexity-class search. Try it now.">
<meta property="og:url" content="https://sintex.ai/os.html">
<meta property="og:type" content="website">
<script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"SintexOS","applicationCategory":"OperatingSystem","operatingSystem":"Cross-Platform","url":"https://sintex.ai/os.html","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"creator":{"@type":"Organization","name":"Sintex.AI","url":"https://sintex.ai"}}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@400;500;600;700&family=Exo+2:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sintex-os.css">
<link rel="stylesheet" href="sintex-os-ext.css">
<link rel="stylesheet" href="sintex-os-v3.css">
</head>
<body>

<!-- ===== BOOT ===== -->
<div id="boot">
  <canvas id="boot-fx"></canvas>
  <div id="boot-center">
    <svg id="boot-logo" width="64" height="64" viewBox="0 0 64 64" fill="none">
      <rect x="4" y="4" width="24" height="24" rx="4" fill="#0078D4"/>
      <rect x="36" y="4" width="24" height="24" rx="4" fill="#00BCF2"/>
      <rect x="4" y="36" width="24" height="24" rx="4" fill="#00B294"/>
      <rect x="36" y="36" width="24" height="24" rx="4" fill="#8764B8"/>
    </svg>
    <div id="boot-spinner"></div>
    <div id="boot-text">SintexOS</div>
  </div>
</div>

<!-- ===== LOCK SCREEN ===== -->
<div id="lockscreen" class="hidden">
  <div id="lock-bg"></div>
  <div id="lock-content">
    <div id="lock-time"></div>
    <div id="lock-date"></div>
    <div id="lock-hint">Click or press any key to unlock</div>
  </div>
</div>

<!-- ===== DESKTOP ===== -->
<div id="desktop">
  <canvas id="wallpaper"></canvas>
  <div id="desk-icons"></div>
</div>

<!-- ===== WINDOWS ===== -->
<div id="win-layer"></div>

<!-- ===== JARVIS COPILOT SIDEBAR ===== -->
<div id="copilot" class="closed">
  <div id="copilot-header">
    <div class="copilot-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="#00d4ff" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="6" stroke="#00d4ff" stroke-width="1"/>
        <circle cx="12" cy="12" r="2.5" fill="#00d4ff"/>
        <line x1="12" y1="2" x2="12" y2="6" stroke="#00d4ff" stroke-width="1"/>
        <line x1="12" y1="18" x2="12" y2="22" stroke="#00d4ff" stroke-width="1"/>
        <line x1="2" y1="12" x2="6" y2="12" stroke="#00d4ff" stroke-width="1"/>
        <line x1="18" y1="12" x2="22" y2="12" stroke="#00d4ff" stroke-width="1"/>
      </svg>
      <span>JARVIS AI</span>
    </div>
    <button id="copilot-close" class="win-ctrl-btn">
      <svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div id="copilot-body"></div>
  <div id="copilot-input">
    <textarea id="copilot-ask" placeholder="Ask JARVIS anything..." rows="1"></textarea>
    <button id="copilot-send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- ===== CONTEXT MENU ===== -->
<div id="ctx" class="hidden">
  <div class="ctx-item" data-a="terminal"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>Open Terminal</div>
  <div class="ctx-item" data-a="notepad"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>New Note</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" data-a="display"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Display Settings</div>
  <div class="ctx-item" data-a="personalize"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Personalize</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" data-a="refresh"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Refresh</div>
</div>

<!-- ===== START MENU ===== -->
<div id="start" class="hidden">
  <div id="start-inner">
    <div id="start-top">
      <input type="text" id="start-search" placeholder="Type to search" autocomplete="off" spellcheck="false">
      <svg class="start-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div id="start-label">
      <span>Pinned</span>
      <button id="start-all-apps-btn" class="start-toggle-btn">All apps &rarr;</button>
    </div>
    <div id="start-pinned-section">
      <div id="start-apps"></div>
    </div>
    <div id="start-all-section" class="hidden">
      <div id="start-all-apps-list"></div>
    </div>
    <div id="start-label2">Recommended</div>
    <div id="start-recent"></div>
    <div id="start-bottom">
      <div id="start-user">
        <div class="user-avatar"></div>
        <span>Elrom</span>
      </div>
      <button id="start-power" title="Power">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ===== TASKBAR ===== -->
<div id="taskbar">
  <div id="tb-left">
    <button id="tb-widgets" class="tb-btn" title="Widgets">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>
    </button>
  </div>
  <div id="tb-center">
    <button id="tb-start" class="tb-btn tb-start" title="Start">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <rect x="1" y="1" width="8" height="8" rx="1.5"/>
        <rect x="11" y="1" width="8" height="8" rx="1.5" opacity="0.75"/>
        <rect x="1" y="11" width="8" height="8" rx="1.5" opacity="0.75"/>
        <rect x="11" y="11" width="8" height="8" rx="1.5" opacity="0.5"/>
      </svg>
    </button>
    <button class="tb-btn tb-search" title="Search" id="tb-search-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <div id="tb-apps"></div>
  </div>
  <div id="tb-right">
    <button class="tb-btn" id="tb-copilot" title="JARVIS AI">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="#00d4ff" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="5" stroke="#00d4ff" stroke-width="1"/>
        <circle cx="12" cy="12" r="2" fill="#00d4ff"/>
      </svg>
    </button>
    <div id="tb-tray">
      <div class="tray-group" id="tb-tray-icons">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" title="Network"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/></svg>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" title="Volume"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </div>
      <div id="tb-clock"></div>
      <button class="tb-btn tb-notify-btn" id="tb-notify" title="Notifications">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ===== SEARCH FLYOUT ===== -->
<div id="search-flyout" class="hidden">
  <div id="sf-inner">
    <input type="text" id="sf-input" placeholder="Search your PC and the web" autocomplete="off" spellcheck="false">
    <div id="sf-results">
      <div class="sf-section-title">Top apps</div>
      <div id="sf-apps-list"></div>
      <div class="sf-section-title">Quick searches</div>
      <div id="sf-quick"></div>
    </div>
  </div>
</div>

<!-- ===== NOTIFICATION CENTER ===== -->
<div id="notify-center" class="hidden">
  <div class="nc-header">
    <span>Notifications</span>
    <button id="nc-clear-all">Clear all</button>
  </div>
  <div id="nc-list"></div>
</div>

<!-- ===== ACTION CENTER ===== -->
<div id="action-center" class="hidden">
  <div class="ac-toggles">
    <button class="ac-toggle" data-toggle="wifi"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/></svg><span>Wi-Fi</span></button>
    <button class="ac-toggle" data-toggle="bluetooth"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/></svg><span>Bluetooth</span></button>
    <button class="ac-toggle" data-toggle="nightlight"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><span>Night Light</span></button>
    <button class="ac-toggle" data-toggle="focus"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg><span>Focus</span></button>
    <button class="ac-toggle active" data-toggle="jarvis"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1"/></svg><span>JARVIS</span></button>
    <button class="ac-toggle active" data-toggle="bitnet"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/></svg><span>BitNet</span></button>
  </div>
  <div class="ac-sliders">
    <div class="ac-slider-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <input type="range" class="ac-range" id="ac-brightness" min="30" max="100" value="100">
    </div>
    <div class="ac-slider-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      <input type="range" class="ac-range" id="ac-volume" min="0" max="100" value="75">
    </div>
  </div>
</div>

<!-- ===== WIDGETS PANEL ===== -->
<div id="widgets-panel" class="hidden">
  <div class="wp-header">
    <span>Widgets</span>
    <button id="wp-close" class="win-ctrl-btn"><svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
  </div>
  <div class="wp-content">
    <div class="wp-widget" id="wp-clock-widget">
      <div class="wp-widget-title">Clock</div>
      <canvas id="wp-clock-canvas" width="160" height="160"></canvas>
    </div>
    <div class="wp-widget" id="wp-system-widget">
      <div class="wp-widget-title">System Status</div>
      <div id="wp-system-bars"></div>
    </div>
    <div class="wp-widget" id="wp-agents-widget">
      <div class="wp-widget-title">AI Agents</div>
      <div id="wp-agents-list"></div>
    </div>
    <div class="wp-widget" id="wp-weather-widget">
      <div class="wp-widget-title">Weather</div>
      <div id="wp-weather-content">Loading...</div>
    </div>
  </div>
</div>

<!-- ===== SNAP INDICATOR ===== -->
<div id="snap-indicator" class="snap-indicator hidden"></div>

<!-- ===== NOTIFICATION TOAST ===== -->
<div id="toast" class="hidden"></div>

<!-- ===== SCRIPTS (modular load order) ===== -->
<script src="https://js.puter.com/v2/"></script>
<script src="bitnet-client.js"></script>
<script src="sintex-os-core.js"></script>
<script src="sintex-os-wm.js"></script>
<script src="sintex-os-shell.js"></script>
<script src="sintex-os-apps.js"></script>
<script src="sintex-os-apps-new.js"></script>
<!-- v3.0: Messenger, Agents, Search, Browser, Voice, Auth, Brain, VPN -->
<script src="sintex-os-messenger.js"></script>
<script src="sintex-os-openclaw.js"></script>
<script src="sintex-os-search-v2.js"></script>
<script src="sintex-os-browser-v2.js"></script>
<script src="sintex-os-voice.js"></script>
<script src="sintex-os-auth.js"></script>
<script src="sintex-os-brain.js"></script>
<script src="sintex-os-vpn.js"></script>
<script src="sintex-os-jarvis.js"></script>
<script src="sintex-os-claude.js"></script>
</body>
</html>
